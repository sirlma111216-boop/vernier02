# Cloudflare Pages 설정
# ⚠️ name 은 실제 Pages 프로젝트 이름과 반드시 일치해야 한다(다르면 git 빌드 실패).
# ⚠️ 정적 자산이 저장소 루트에 있으므로 출력 디렉터리는 "." 이다.
# 비밀값(GEMINI_API_KEY 등)은 이 파일이 아니라 대시보드 환경변수에 그대로 남아 있다.
name = "vernier02"
pages_build_output_dir = "."
compatibility_date = "2025-06-01"

# Placement Hint: 함수를 도쿄(gcp:asia-northeast1)에 가장 가까운 엣지에서 실행시켜
# 홍콩(HKG) 등 Gemini 미지원 colo 배정을 피한다. (mode=smart 와 동시 사용 불가)
[placement]
region = "gcp:asia-northeast1"
